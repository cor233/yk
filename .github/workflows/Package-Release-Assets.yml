name: Package Release Assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: '输入版本号（例如 v1.2.3，留空或输入 latest 则自动选最新）'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: read
  actions: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 GitHub CLI
        run: |
          type gh >/dev/null 2>&1 || sudo apt-get install gh -y

      - name: 列出所有可用版本
        run: |
          echo "📋 可用版本列表："
          gh release list --repo "${{ github.repository }}" --limit 100

      - name: 确定目标版本
        id: tag
        run: |
          input="${{ github.event.inputs.release_tag }}"
          if [ -z "$input" ] || [ "$input" = "latest" ]; then
            tag=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName -q '.[0].tagName')
          else
            tag="$input"
            if ! gh release view "$tag" --repo "${{ github.repository }}" &>/dev/null; then
              if [[ "$tag" =~ ^[vV] ]]; then
                new_tag=$(echo "$tag" | sed 's/^v/V/;s/^V/v/')
                if gh release view "$new_tag" --repo "${{ github.repository }}" &>/dev/null; then
                  tag="$new_tag"
                fi
              fi
            fi
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "🎯 目标版本：$tag"

      - name: 下载附件
        run: |
          mkdir -p package
          gh release download "${{ steps.tag.outputs.tag }}" -D package --repo "${{ github.repository }}"

      - name: 提取发布说明
        run: |
          gh release view "${{ steps.tag.outputs.tag }}" --repo "${{ github.repository }}" --json body -q .body > package/release_notes.txt

      - name: 打包为 ZIP（静默）
        run: |
          cd package
          zip -qr "../${{ steps.tag.outputs.tag }}.zip" .
          cd ..

      - name: 上传为临时构件
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: ${{ steps.tag.outputs.tag }}.zip
          retention-days: 90

      - name: 获取构件下载链接
        id: artifact_url
        run: |
          artifact_url=$(gh api -X GET /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[] | select(.name=="release-package") | .archive_download_url')
          echo "artifact_url=$artifact_url" >> $GITHUB_OUTPUT
          echo "prefixed_url=https://gh.xxooo.cf/$artifact_url" >> $GITHUB_OUTPUT

      - name: 显示加速下载链接
        run: |
          echo "🚀 加速下载链接（临时，90天有效）："
          echo "${{ steps.artifact_url.outputs.prefixed_url }}"
