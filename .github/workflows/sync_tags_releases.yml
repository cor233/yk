name: sync tags & releases

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取上游所有标签
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote add upstream https://github.com/ingriddaleusag-dotcom/PickTV.git
          git fetch upstream --tags --force

      - name: 同步所有标签
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_REPO="${{ github.repository }}"

          git tag | while read -r tag; do
            echo "=============================="
            echo "正在处理标签：$tag"

            if gh release view "$tag" -R "$TARGET_REPO" &>/dev/null; then
              echo "标签 $tag 已存在，跳过。"
              continue
            fi

            BODY=$(gh release view "$tag" -R "ingriddaleusag-dotcom/PickTV" --json body -q .body 2>/dev/null || echo "")

            if [ -n "$BODY" ]; then
              echo "标签 $tag 包含附注信息，正在创建发行版..."
              echo "$BODY" > body.txt
              if gh release create "$tag" --repo "$TARGET_REPO" --title "$tag" --notes-file body.txt; then
                echo "✅ 已为标签 $tag 创建发行版。"
              else
                echo "❌ 为标签 $tag 创建发行版失败。"
                rm -f body.txt
                continue
              fi
              rm -f body.txt
            else
              echo "标签 $tag 无附注信息，正在创建空发行版..."
              if gh release create "$tag" --repo "$TARGET_REPO" --title "$tag" --notes "无附注信息"; then
                echo "✅ 已为标签 $tag 创建空发行版。"
              else
                echo "❌ 为标签 $tag 创建空发行版失败。"
                continue
              fi
            fi

            echo "正在下载并上传 $tag 的附件..."
            TEMP_DIR=$(mktemp -d)

            (
              cd "$TEMP_DIR" || exit
              if gh release download "$tag" -R "ingriddaleusag-dotcom/PickTV" --clobber 2>/dev/null; then
                for file in *; do
                  if [ -f "$file" ]; then
                    echo "⬆️ 上传附件：$file"
                    gh release upload "$tag" "$file" --repo "$TARGET_REPO" --clobber || echo "上传 $file 失败"
                  fi
                done
              else
                echo "该标签没有附件。"
              fi
            )

            rm -rf "$TEMP_DIR"
          done
